name: Build Android APK

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── Код ──────────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java (нужен Android Gradle) ──────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Android SDK + NDK ────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK & CMake
        run: |
          sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Set ANDROID_NDK_HOME
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      # ── Rust ─────────────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android targets
        run: |
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            x86_64-linux-android \
            i686-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # ── Node + pnpm ──────────────────────────────────────────────────────────
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install JS dependencies
        working-directory: desktop
        run: pnpm install

      # ── Кросс-компиляция libopus для aarch64-android ─────────────────────────
      - name: Pre-build libopus for aarch64-android
        run: |
          set -e
          NDK_BIN="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          OPUS_PREFIX="${HOME}/opus-android-aarch64"

          curl -fsSL "https://downloads.xiph.org/releases/opus/opus-1.5.2.tar.gz" | tar xz
          cd opus-1.5.2

          ./configure \
            --host=aarch64-linux-android \
            CC="${NDK_BIN}/aarch64-linux-android26-clang" \
            AR="${NDK_BIN}/llvm-ar" \
            RANLIB="${NDK_BIN}/llvm-ranlib" \
            STRIP="${NDK_BIN}/llvm-strip" \
            --enable-static \
            --disable-shared \
            --disable-doc \
            --disable-extra-programs \
            --with-pic \
            --prefix="${OPUS_PREFIX}"

          make -j$(nproc) install

          echo "LIBOPUS_LIB_DIR=${OPUS_PREFIX}/lib" >> $GITHUB_ENV
          echo "LIBOPUS_STATIC=1"                   >> $GITHUB_ENV
          echo "LIBOPUS_NO_PKG=1"                   >> $GITHUB_ENV

      # ── Tauri CLI ─────────────────────────────────────────────────────────────
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      # ── Генерируем Android-проект (src-tauri/gen/android) ────────────────────
      - name: tauri android init
        working-directory: desktop
        run: cargo tauri android init
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      # ── ИСПРАВЛЕНИЕ: Патчим AndroidManifest.xml ──────────────────────────────
      # Tauri 2 автоматически добавляет INTERNET permission, но НЕ добавляет
      # android:usesCleartextTraffic="true". Без него Android 9+ (API 28+) блокирует
      # HTTP-трафик к http://127.0.0.1:PORT (warp-серверы статики и прокси).
      # minSdkVersion=26 (Android 8), но реальные телефоны пользователей — на API 28+.
      - name: Patch AndroidManifest.xml
        run: |
          MANIFEST="desktop/src-tauri/gen/android/app/src/main/AndroidManifest.xml"

          echo "=== AndroidManifest.xml ДО патча ==="
          cat "$MANIFEST"

          # 1. Добавляем usesCleartextTraffic="true" в <application>, если ещё нет
          if ! grep -q 'usesCleartextTraffic' "$MANIFEST"; then
            # Вставляем атрибут к первому вхождению <application
            # Используем Python для безопасного XML-редактирования
            python3 - "$MANIFEST" <<'PYEOF'
          import sys, re

          path = sys.argv[1]
          with open(path, 'r', encoding='utf-8') as f:
              content = f.read()

          # Добавляем атрибут в тег <application ...>
          # Ищем первый <application с пробелом/переносом после него
          content = re.sub(
              r'(<application\b)',
              r'\1\n        android:usesCleartextTraffic="true"',
              content,
              count=1
          )

          with open(path, 'w', encoding='utf-8') as f:
              f.write(content)

          print("usesCleartextTraffic=true добавлен")
          PYEOF
          else
            echo "usesCleartextTraffic уже присутствует, пропускаем"
          fi

          # 2. Проверяем наличие INTERNET permission (Tauri добавляет автоматически)
          if grep -q 'android.permission.INTERNET' "$MANIFEST"; then
            echo "✅ INTERNET permission: OK"
          else
            echo "⚠️  INTERNET permission отсутствует! Добавляем..."
            python3 - "$MANIFEST" <<'PYEOF'
          import sys, re

          path = sys.argv[1]
          with open(path, 'r', encoding='utf-8') as f:
              content = f.read()

          # Добавляем перед </manifest>
          content = content.replace(
              '</manifest>',
              '    <uses-permission android:name="android.permission.INTERNET" />\n</manifest>'
          )

          with open(path, 'w', encoding='utf-8') as f:
              f.write(content)

          print("INTERNET permission добавлен")
          PYEOF
          fi

          echo ""
          echo "=== AndroidManifest.xml ПОСЛЕ патча ==="
          cat "$MANIFEST"

      # ── Keystore ─────────────────────────────────────────────────────────────
      - name: Set up signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > $RUNNER_TEMP/release.keystore
          echo "TAURI_ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> $GITHUB_ENV

      - name: Export signing env vars
        run: |
          echo "TAURI_ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}"             >> $GITHUB_ENV
          echo "TAURI_ANDROID_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "TAURI_ANDROID_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}"       >> $GITHUB_ENV

      # ── Инвалидируем кеш audiopus_sys ────────────────────────────────────────
      - name: Invalidate audiopus_sys build cache
        run: |
          rm -rf desktop/src-tauri/target/aarch64-linux-android/release/build/audiopus_sys-*/
          rm -rf desktop/src-tauri/target/aarch64-linux-android/release/build/audiopus-*/

      # ── Сборка APK ───────────────────────────────────────────────────────────
      - name: Build APK (aarch64)
        working-directory: desktop
        run: cargo tauri android build --apk --target aarch64
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      # ── Ищем APK ─────────────────────────────────────────────────────────────
      - name: Find APK files
        id: find-apk
        run: |
          APK=$(find desktop/src-tauri/gen/android -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"

      # ── Загружаем как артефакт ────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: soundcloud-android-apk
          path: desktop/src-tauri/gen/android/**/*.apk
          if-no-files-found: error

      # ── Публикуем в Release если это тег v* ─────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/src-tauri/gen/android/**/*.apk
          generate_release_notes: true
